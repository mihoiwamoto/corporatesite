<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="/assets/images/favicon.svg">
<title>お問い合わせ | 株式会社ランステック</title>
<meta name="description" content="株式会社ランステックへのお問い合わせ。※外部からの開発案件は承っておりません。">
<meta property="og:title" content="お問い合わせ | 株式会社ランステック">
<meta property="og:description" content="お気軽にお問い合わせください。">
<meta property="og:type" content="website">
<meta property="og:site_name" content="株式会社ランステック">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Outfit:wght@800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/css/header.css">
<link rel="stylesheet" href="/assets/css/footer.css">
<link rel="stylesheet" href="/assets/css/background.css">
<link rel="stylesheet" href="/assets/css/contact.css">
<link rel="stylesheet" href="/assets/css/index.css">
</head>
<body>

<div id="site-header"></div>

<div class="page-hero">
  <div class="wrap">
    <p class="breadcrumb"><a href="index.html">ホーム</a><span>/</span>お問い合わせ</p>
    <p class="eyebrow">CONTACT</p>
    <h1>お問い合わせ</h1>
    <p class="sub">お問い合わせは、こちらのフォームよりお送りください。</p>
  </div>
</div>

<section class="form-section">
  <div class="wrap">
    <div class="form-layout">
      <form class="contact-form" action="thanks.html" method="get" novalidate>
        <div class="field">
          <label for="name">お名前 <span class="required-badge">必須</span></label>
          <input type="text" id="name" name="name" placeholder="山田 太郎" autocomplete="name" required>
        </div>
        <div class="field">
          <label for="company">会社名 <span class="optional-badge">任意</span></label>
          <input type="text" id="company" name="company" placeholder="株式会社〇〇" autocomplete="organization">
        </div>
        <div class="field">
          <label for="email">メールアドレス <span class="required-badge">必須</span></label>
          <input type="email" id="email" name="email" placeholder="your@email.com" autocomplete="email" required>
        </div>
        <div class="field">
          <label for="message">お問い合わせ内容 <span class="required-badge">必須</span></label>
          <textarea id="message" name="message" placeholder="ご相談内容・ご質問をご記入ください。" required></textarea>
        </div>
        <p class="form-note">送信いただいた個人情報は、お問い合わせへの対応のみに使用し、第三者へ提供することはありません。詳しくは<a href="privacy.html">プライバシーポリシー</a>をご覧ください。</p>
        <button type="submit" class="submit-btn">
          <span>送信する</span>
          <svg class="submit-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
        </button>
      </form>
    </div>
  </div>
</section>

<!-- INTERVIEW BADGE -->
<div class="interview-badge-wrapper">
  <div class="interview-badge-bg">
    <button class="interview-badge-close" aria-label="閉じる">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 6L6 18M6 6l12 12"/>
      </svg>
    </button>
    <a href="interview/hasegawa.html" class="interview-badge" aria-label="社員インタビュー公開中">
      <div class="interview-badge-card">
        <div class="interview-badge-label">INTERVIEW</div>
        <div class="interview-badge-title">社員インタビュー公開中</div>
        <div class="interview-badge-button">
          View More →
        </div>
      </div>
    </a>
  </div>
</div>

<div id="site-footer"></div>


<script src="/assets/js/header.js"></script>
<script src="/assets/js/footer.js"></script>
<script src="/assets/js/lenis.min.js"></script>
<script src="/assets/js/smooth-scroll.js"></script>

<script>
(function() {
  var form = document.querySelector('.contact-form');
  if (!form) return;
  form.addEventListener('submit', function(e) {
    e.preventDefault();
    // デモサイトのため入力チェックは行わず、送信ボタン押下で完了ページへ遷移する。
    // （フォームの novalidate 属性で必須項目のエラー表示も無効化している）
    // TODO: 本番（WP移行後）では form の novalidate を外し、
    //   Contact Form 7 等で実際の送信処理＋バリデーションを行ったうえで
    //   thanks.html へ遷移させる。現状はバックエンド未接続で内容は送信されない。
    window.location.href = 'thanks.html';
  });
})();

// Interview badge close functionality
document.addEventListener('DOMContentLoaded', function() {
  const closeBtn = document.querySelector('.interview-badge-close');
  const badgeWrapper = document.querySelector('.interview-badge-wrapper');

  if (closeBtn && badgeWrapper) {
    closeBtn.addEventListener('click', function(e) {
      e.preventDefault();
      e.stopPropagation();
      badgeWrapper.style.opacity = '0';
      badgeWrapper.style.transform = 'translateY(20px) scale(0.95)';
      setTimeout(function() {
        badgeWrapper.style.display = 'none';
      }, 300);
      sessionStorage.setItem('interviewBadgeClosed', 'true');
    });

    if (sessionStorage.getItem('interviewBadgeClosed') === 'true') {
      badgeWrapper.style.display = 'none';
    }
  }
});
</script>


</body>
</html>
