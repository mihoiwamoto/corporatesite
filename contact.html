<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="/assets/images/favicon.svg">
<title>お問い合わせ | 株式会社ランステック</title>
<meta name="description" content="株式会社ランステックへのお問い合わせ。採用に関するご質問・その他お問い合わせはこちらのフォームよりお送りください。※外部からの開発案件は承っておりません。">
<meta property="og:title" content="お問い合わせ | 株式会社ランステック">
<meta property="og:description" content="採用に関するご質問など、お気軽にお問い合わせください。">
<meta property="og:type" content="website">
<meta property="og:site_name" content="株式会社ランステック">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Outfit:wght@800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/css/header.css">
<link rel="stylesheet" href="/assets/css/footer.css">
<link rel="stylesheet" href="/assets/css/background.css">
<link rel="stylesheet" href="/assets/css/contact.css">
</head>
<body>

<div id="site-header"></div>

<div class="page-hero">
  <div class="wrap">
    <p class="breadcrumb"><a href="index.html">ホーム</a><span>/</span>お問い合わせ</p>
    <p class="eyebrow">CONTACT</p>
    <h1>お問い合わせ</h1>
    <p class="sub">採用に関するご質問やその他お問い合わせは、こちらのフォームよりお送りください。内容を確認のうえ、担当者より2営業日以内にご連絡いたします。</p>
  </div>
</div>

<section class="form-section">
  <div class="wrap">
    <div class="form-layout">
      <form class="contact-form" action="#" method="post">
        <div class="field">
          <label for="name">お名前 <span class="required-badge">必須</span></label>
          <input type="text" id="name" name="name" placeholder="山田 太郎" autocomplete="name" required>
        </div>
        <div class="field">
          <label for="company">会社名 <span class="optional-badge">任意</span></label>
          <input type="text" id="company" name="company" placeholder="株式会社〇〇" autocomplete="organization">
        </div>
        <div class="field">
          <label for="email">メールアドレス <span class="required-badge">必須</span></label>
          <input type="email" id="email" name="email" placeholder="your@email.com" autocomplete="email" required>
        </div>
        <div class="field">
          <label for="message">お問い合わせ内容 <span class="required-badge">必須</span></label>
          <textarea id="message" name="message" placeholder="ご相談内容・ご質問をご記入ください。" required></textarea>
        </div>
        <p class="form-note">送信いただいた個人情報は、お問い合わせへの対応のみに使用し、第三者へ提供することはありません。詳しくは<a href="privacy.html">プライバシーポリシー</a>をご覧ください。</p>
        <button type="submit" class="submit-btn">送信する</button>
      </form>

    </div>
  </div>
</section>

<div id="site-footer"></div>


<script src="/assets/js/header.js"></script>
<script src="/assets/js/footer.js"></script>
<script src="/assets/js/lenis.min.js"></script>
<script src="/assets/js/smooth-scroll.js"></script>

<script>
(function() {
  // 他ページからの遷移時に種別を自動選択（例: contact.html?type=recruit）
  try {
    var type = new URLSearchParams(window.location.search).get('type');
    var allowed = { dev: 1, recruit: 1, other: 1 };
    var sel = document.getElementById('type');
    if (sel && type && allowed[type]) sel.value = type;
  } catch (e) {}
})();
</script>


<script src="/assets/js/feedback-panel-v2.js"></script>
</body>
</html>
