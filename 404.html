<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<link rel="icon" type="image/svg+xml" href="/assets/images/favicon.svg">
<title>404 Not Found | 株式会社ランステック</title>
<meta name="description" content="お探しのページが見つかりませんでした。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Outfit:wght@700&family=Zen+Kaku+Gothic+New:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/css/header.css">
<link rel="stylesheet" href="/assets/css/footer.css">
<link rel="stylesheet" href="/assets/css/background.css">
<style>
  :root {
    --pink: #D4637E;
    --pink-dark: #B84A66;
    --pink-light: #FDF2F5;
    --ink: #243040;
    --sub: #4A5568;
    --line: #E8ECF0;
    --bg: #ffffff;
    --bg-soft: #F7F8FA;
    --maxw: 1200px;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: linear-gradient(180deg, #f8f9fa 0%, #ffffff 100%);
    min-height: 100vh;
  }

  .wrap {
    max-width: var(--maxw);
    margin: 0 auto;
    padding: 0 40px;
    position: relative;
  }

  .page-wrapper {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  .error-container {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 120px 20px 60px;
    text-align: center;
  }

  .error-content {
    max-width: 800px;
    width: 100%;
  }

  .error-number {
    font-family: 'Outfit', sans-serif;
    font-size: clamp(120px, 25vw, 280px);
    font-weight: 700;
    line-height: 1;
    letter-spacing: -0.02em;
    margin-bottom: 20px;
    background: linear-gradient(135deg, #89CFF0 0%, #B4A7D6 50%, #B4A7D6 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: 0 4px 30px rgba(137, 207, 240, 0.15);
  }

  .error-text {
    font-family: 'Outfit', sans-serif;
    font-size: clamp(32px, 6vw, 72px);
    font-weight: 700;
    letter-spacing: 0.05em;
    color: #e8e8e8;
    text-transform: uppercase;
    margin-bottom: 40px;
    text-shadow: 0 2px 15px rgba(0, 0, 0, 0.05);
  }

  .error-message {
    font-size: clamp(14px, 2vw, 18px);
    line-height: 1.8;
    color: #666666;
    margin-bottom: 50px;
    font-weight: 400;
  }

  .btn-home {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    padding: 16px 36px;
    background: #242E3D;
    color: #ffffff;
    text-decoration: none;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.08em;
    border-radius: 50px;
    transition: all 0.3s ease;
    box-shadow: 0 4px 15px rgba(36, 46, 61, 0.2);
  }

  .btn-home:hover {
    background: #1a2332;
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(36, 46, 61, 0.3);
  }

  .btn-home svg {
    width: 20px;
    height: 20px;
    transition: transform 0.3s ease;
  }

  .btn-home:hover svg {
    transform: translateX(-3px);
  }

  @media (max-width: 768px) {
    .error-container {
      padding: 80px 20px 40px;
    }

    .error-message {
      margin-bottom: 35px;
    }

    .btn-home {
      padding: 14px 30px;
      font-size: 14px;
    }
  }
</style>
</head>
<body>

<div id="site-header"></div>

<div class="page-wrapper">
<div class="error-container">
  <div class="error-content">
    <div class="error-number">404</div>
    <div class="error-text">NOT FOUND</div>
    <p class="error-message">
      お探しのページが見つかりませんでした。<br>
      URLが間違っているか、ページが移動または削除された可能性があります。
    </p>
    <a href="/index.html" class="btn-home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5M12 19l-7-7 7-7"/>
      </svg>
      トップページへ戻る
    </a>
  </div>
</div>
</div>

<div id="site-footer"></div>

<script src="/assets/js/header.js"></script>
<script src="/assets/js/footer.js"></script>
</body>
</html>
