<style>
  :root {
    --pink:        #E07898;
    --pink-dark:   #C0587A;
    --pink-light:  #FBF0F4;
    --ink:         #333333;
    --sub:         #666666;
    --bg:          #ffffff;
    --bg-soft:     #f7f7f7;
    --line:        #e0e0e0;
    --maxw:        100%;
    --fs-body:     16px;
    --fs-note:     14px;
    --fs-tag:      12px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :focus-visible { outline: 2px solid var(--pink); outline-offset: 3px; }
  body { font-family: 'Noto Sans JP', 'Hiragino Sans', sans-serif; color: var(--ink); background: linear-gradient(180deg, #FBF0F4 0%, #E5F6F3 100%); line-height: 1.75; font-weight: 400; text-wrap: pretty; word-break: auto-phrase; min-height: 100vh; }
  .site-wrapper { background: transparent; margin: 0 120px; }
  html { scroll-behavior: smooth; }
  .wrap { max-width: var(--maxw); margin: 0 auto; padding: 0 80px; }

  /* ── PAGE HERO ── */
  .page-hero {
    padding: 120px 0 80px;
    background: transparent;
    backdrop-filter: none;
    position: relative;
    overflow: hidden;
    margin: 0 -120px;
  }
  .page-hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.03) 2px, rgba(255,255,255,0.03) 4px),
      repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(255,255,255,0.03) 2px, rgba(255,255,255,0.03) 4px);
    pointer-events: none;
    z-index: 0;
  }
  .page-hero .wrap {
    position: relative;
    z-index: 1;
    max-width: 1200px;
    padding: 0 80px;
  }
  .breadcrumb {
    font-size: 13px;
    color: var(--sub);
    margin-bottom: 32px;
    line-height: 1.7;
  }
  .breadcrumb a {
    color: var(--sub);
    text-decoration: none;
    transition: color .15s;
  }
  .breadcrumb a:hover {
    color: var(--ink);
  }
  .breadcrumb span {
    margin: 0 8px;
  }
  .page-title-wrapper {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .page-label {
    font-size: 13px;
    font-weight: 700;
    color: var(--sub);
    letter-spacing: .1em;
  }
  .page-title {
    font-family: 'Oswald', sans-serif;
    font-size: clamp(48px, 8vw, 72px);
    font-weight: 700;
    color: var(--pink);
    line-height: 1;
    letter-spacing: -.02em;
  }
  .page-subtitle {
    font-size: 16px;
    color: var(--sub);
    line-height: 1.9;
    margin-top: 16px;
  }

  /* ── INTERVIEW LIST ── */
  .interview-list-section {
    padding: 100px 0 140px;
    background: transparent;
    backdrop-filter: none;
    position: relative;
  }
  .interview-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 40px;
  }
  .interview-card {
    background: #ffffff;
    backdrop-filter: none;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(0,0,0,.08);
    transition: all .3s cubic-bezier(0.34, 1.56, 0.64, 1);
    border: none;
  }
  .interview-card:hover {
    transform: translateY(-8px);
    box-shadow: 0 16px 48px rgba(0,0,0,.12);
  }
  .interview-card-image {
    width: 100%;
    aspect-ratio: 16/9;
    overflow: hidden;
    background: var(--pink-light);
    position: relative;
  }
  .interview-card-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform .4s ease;
  }
  .interview-card:hover .interview-card-image img {
    transform: scale(1.05);
  }
  .interview-card-content {
    padding: 32px;
  }
  .interview-card-meta {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }
  .interview-card-date {
    font-size: 12px;
    color: var(--sub);
    font-weight: 400;
    letter-spacing: .03em;
  }
  .interview-card-cat {
    display: inline-block;
    background: var(--pink-light);
    border: 1px solid var(--line);
    color: var(--pink);
    font-size: var(--fs-tag);
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 4px;
  }
  .interview-card-title {
    font-size: 20px;
    font-weight: 700;
    line-height: 1.5;
    margin-bottom: 12px;
    color: var(--ink);
  }
  .interview-card-excerpt {
    font-size: 14px;
    color: var(--sub);
    line-height: 1.8;
    margin-bottom: 20px;
  }
  .interview-card-link {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    color: var(--pink);
    font-size: 14px;
    font-weight: 700;
    text-decoration: none;
    transition: gap .2s ease;
  }
  .interview-card-link:hover {
    gap: 12px;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 1024px) {
    .site-wrapper {
      margin: 0 60px;
    }
    .page-hero {
      margin: 0 -60px;
    }
    .wrap {
      padding: 0 40px;
    }
    .page-hero .wrap {
      padding: 0 40px;
    }
  }

  @media (max-width: 768px) {
    .site-wrapper {
      margin: 0 20px;
    }
    .page-hero {
      margin: 0 -20px;
      padding: 80px 0 60px;
    }
    .wrap {
      padding: 0 20px;
    }
    .page-hero .wrap {
      padding: 0 20px;
    }
    .interview-grid {
      grid-template-columns: 1fr;
      gap: 32px;
    }
    .interview-list-section {
      padding: 60px 0 80px;
    }
  }
</style>
</head>
