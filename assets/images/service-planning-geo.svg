<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad-pink-1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E07898;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C86080;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-green-1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#009944;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#007A36;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow-soft">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- 対話を表す2つの人物（円と半円） -->
  <circle cx="140" cy="130" r="35" fill="url(#grad-pink-1)" filter="url(#shadow-soft)"/>
  <circle cx="260" cy="130" r="35" fill="url(#grad-green-1)" filter="url(#shadow-soft)"/>

  <!-- 人物の体（台形 → 角丸台形） -->
  <path d="M 115,165 Q 110,165 110,170 L 100,210 Q 100,215 105,215 L 175,215 Q 180,215 180,210 L 170,170 Q 170,165 165,165 Z" fill="url(#grad-pink-1)" opacity="0.85" filter="url(#shadow-soft)"/>
  <path d="M 235,165 Q 230,165 230,170 L 220,210 Q 220,215 225,215 L 295,215 Q 300,215 300,210 L 290,170 Q 290,165 285,165 Z" fill="url(#grad-green-1)" opacity="0.85" filter="url(#shadow-soft)"/>

  <!-- 対話を表す吹き出し -->
  <rect x="60" y="70" width="70" height="45" rx="12" fill="url(#grad-pink-1)" opacity="0.9" filter="url(#shadow-soft)"/>
  <path d="M 80,115 L 90,125 L 100,115 Z" fill="url(#grad-pink-1)" opacity="0.9"/>

  <rect x="270" y="70" width="70" height="45" rx="12" fill="url(#grad-green-1)" opacity="0.9" filter="url(#shadow-soft)"/>
  <path d="M 310,115 L 300,125 L 290,115 Z" fill="url(#grad-green-1)" opacity="0.9"/>

  <!-- 中央の共有ドキュメント（ノート） -->
  <rect x="175" y="180" width="50" height="65" rx="8" fill="#fff" filter="url(#shadow-soft)"/>
  <line x1="185" y1="195" x2="215" y2="195" stroke="#009944" stroke-width="2" opacity="0.6"/>
  <line x1="185" y1="210" x2="215" y2="210" stroke="#009944" stroke-width="2" opacity="0.6"/>
  <line x1="185" y1="225" x2="210" y2="225" stroke="#009944" stroke-width="2" opacity="0.6"/>

  <!-- 接続線（ヒアリングの流れ） -->
  <path d="M 140,165 Q 160,175 175,185" stroke="url(#grad-pink-1)" stroke-width="2.5" opacity="0.7" fill="none" stroke-linecap="round"/>
  <path d="M 260,165 Q 240,175 225,185" stroke="url(#grad-green-1)" stroke-width="2.5" opacity="0.7" fill="none" stroke-linecap="round"/>
</svg>
