<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-op" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FBF0F4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#eaf5ef;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg-op)"/>

  <!-- Server/System nodes -->
  <!-- Top node (monitoring) -->
  <circle cx="400" cy="140" r="45" fill="white" stroke="#009944" stroke-width="3"/>
  <rect x="385" y="130" width="30" height="20" rx="3" fill="none" stroke="#009944" stroke-width="2"/>
  <line x1="390" y1="135" x2="410" y2="135" stroke="#009944" stroke-width="1.5"/>
  <line x1="390" y1="140" x2="405" y2="140" stroke="#009944" stroke-width="1.5"/>
  <line x1="390" y1="145" x2="410" y2="145" stroke="#009944" stroke-width="1.5"/>

  <!-- Left node (database) -->
  <circle cx="240" cy="300" r="45" fill="white" stroke="#E07898" stroke-width="3"/>
  <ellipse cx="240" cy="290" rx="20" ry="8" fill="none" stroke="#E07898" stroke-width="2"/>
  <line x1="220" y1="290" x2="220" y2="310" stroke="#E07898" stroke-width="2"/>
  <line x1="260" y1="290" x2="260" y2="310" stroke="#E07898" stroke-width="2"/>
  <ellipse cx="240" cy="310" rx="20" ry="8" fill="none" stroke="#E07898" stroke-width="2"/>

  <!-- Right node (server) -->
  <circle cx="560" cy="300" r="45" fill="white" stroke="#E07898" stroke-width="3"/>
  <rect x="545" y="290" width="30" height="8" rx="2" fill="none" stroke="#E07898" stroke-width="2"/>
  <rect x="545" y="302" width="30" height="8" rx="2" fill="none" stroke="#E07898" stroke-width="2"/>
  <circle cx="551" cy="294" r="2" fill="#E07898"/>
  <circle cx="551" cy="306" r="2" fill="#E07898"/>

  <!-- Bottom node (user/client) -->
  <circle cx="400" cy="460" r="45" fill="white" stroke="#009944" stroke-width="3"/>
  <circle cx="400" cy="450" r="15" fill="none" stroke="#009944" stroke-width="2.5"/>
  <path d="M 400 465 Q 400 458, 408 455 L 418 480 Q 400 488, 382 480 L 392 455 Q 400 458, 400 465 Z" fill="none" stroke="#009944" stroke-width="2.5"/>

  <!-- Connection lines -->
  <line x1="400" y1="185" x2="400" y2="245" stroke="#5A6872" stroke-width="2.5" stroke-dasharray="8,6" opacity="0.6"/>
  <line x1="370" y1="165" x2="270" y2="270" stroke="#5A6872" stroke-width="2.5" stroke-dasharray="8,6" opacity="0.6"/>
  <line x1="430" y1="165" x2="530" y2="270" stroke="#5A6872" stroke-width="2.5" stroke-dasharray="8,6" opacity="0.6"/>
  <line x1="400" y1="355" x2="400" y2="415" stroke="#5A6872" stroke-width="2.5" stroke-dasharray="8,6" opacity="0.6"/>
  <line x1="285" y1="315" x2="355" y2="445" stroke="#5A6872" stroke-width="2.5" stroke-dasharray="8,6" opacity="0.6"/>
  <line x1="515" y1="315" x2="445" y2="445" stroke="#5A6872" stroke-width="2.5" stroke-dasharray="8,6" opacity="0.6"/>

  <!-- Activity indicator (pulse) -->
  <circle cx="400" cy="300" r="12" fill="#009944" opacity="0.3">
    <animate attributeName="r" from="8" to="20" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" from="0.6" to="0" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="400" cy="300" r="8" fill="#009944" opacity="0.8"/>

  <!-- Status indicators -->
  <circle cx="620" cy="140" r="10" fill="#009944" opacity="0.6"/>
  <text x="640" y="146" font-family="sans-serif" font-size="14" fill="#009944" font-weight="500">正常稼働</text>

  <!-- Decorative elements -->
  <circle cx="120" cy="200" r="8" fill="#E07898" opacity="0.25"/>
  <circle cx="680" cy="400" r="12" fill="#009944" opacity="0.25"/>
  <circle cx="140" cy="500" r="6" fill="#E07898" opacity="0.2"/>
</svg>
