<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad-green-2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#009944;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#007A36;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-pink-2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E07898;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C86080;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow-soft-2">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- モニター画面 -->
  <rect x="80" y="60" width="240" height="160" rx="12" fill="url(#grad-green-2)" filter="url(#shadow-soft-2)"/>

  <!-- 画面内の背景レイヤー（奥行き感） -->
  <rect x="90" y="75" width="220" height="130" rx="8" fill="#007A36" opacity="0.3"/>

  <!-- モニタースタンド -->
  <rect x="175" y="220" width="50" height="15" rx="6" fill="url(#grad-pink-2)" filter="url(#shadow-soft-2)"/>
  <path d="M 185,235 L 190,220 L 210,220 L 215,235 Z" fill="url(#grad-pink-2)" opacity="0.85"/>
  <rect x="170" y="235" width="60" height="8" rx="4" fill="url(#grad-pink-2)" filter="url(#shadow-soft-2)"/>

  <!-- コード行（画面内） -->
  <rect x="100" y="85" width="80" height="8" rx="4" fill="#fff" opacity="0.9"/>
  <rect x="100" y="105" width="120" height="8" rx="4" fill="url(#grad-pink-2)" opacity="0.85"/>
  <rect x="100" y="125" width="95" height="8" rx="4" fill="#fff" opacity="0.9"/>
  <rect x="100" y="145" width="140" height="8" rx="4" fill="url(#grad-pink-2)" opacity="0.85"/>
  <rect x="100" y="165" width="70" height="8" rx="4" fill="#fff" opacity="0.9"/>
  <rect x="100" y="185" width="110" height="8" rx="4" fill="url(#grad-pink-2)" opacity="0.85"/>

  <!-- キーボード -->
  <rect x="65" y="250" width="270" height="35" rx="8" fill="url(#grad-pink-2)" filter="url(#shadow-soft-2)"/>
  <g opacity="0.9">
    <rect x="80" y="260" width="12" height="12" rx="3" fill="#fff"/>
    <rect x="98" y="260" width="12" height="12" rx="3" fill="#fff"/>
    <rect x="116" y="260" width="12" height="12" rx="3" fill="#fff"/>
    <rect x="134" y="260" width="12" height="12" rx="3" fill="#fff"/>
    <rect x="152" y="260" width="12" height="12" rx="3" fill="#fff"/>
    <rect x="170" y="260" width="30" height="12" rx="3" fill="#fff"/>
  </g>

  <!-- カーソル -->
  <path d="M 250,135 L 250,155 L 258,147 Z" fill="#fff" opacity="0.95" filter="url(#shadow-soft-2)"/>
</svg>
