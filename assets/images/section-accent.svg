<svg width="600" height="400" viewBox="0 0 600 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- セクション装飾用の抽象的な幾何学パターン -->

  <!-- 大きな円形の要素 -->
  <circle cx="500" cy="80" r="120" fill="none" stroke="#E07898" stroke-width="1.5" opacity="0.15"/>
  <circle cx="500" cy="80" r="90" fill="none" stroke="#E07898" stroke-width="1" opacity="0.1"/>

  <!-- 小さな装飾円 -->
  <circle cx="100" cy="300" r="60" fill="none" stroke="#009944" stroke-width="1.5" opacity="0.15"/>
  <circle cx="100" cy="300" r="40" fill="none" stroke="#009944" stroke-width="1" opacity="0.1"/>

  <!-- 三角形の装飾 -->
  <path d="M 450,320 L 510,340 L 470,380 Z" fill="none" stroke="#E07898" stroke-width="1.5" opacity="0.12"/>

  <!-- 正方形の装飾 -->
  <rect x="50" y="50" width="40" height="40" fill="none" stroke="#009944" stroke-width="1.5" opacity="0.15" transform="rotate(15 70 70)"/>

  <!-- 線の装飾 -->
  <line x1="200" y1="100" x2="350" y2="100" stroke="#E07898" stroke-width="1" opacity="0.1"/>
  <line x1="200" y1="300" x2="350" y2="300" stroke="#009944" stroke-width="1" opacity="0.1"/>

  <!-- グリッドパターン -->
  <g opacity="0.08">
    <line x1="0" y1="200" x2="600" y2="200" stroke="#5a6872" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="400" stroke="#5a6872" stroke-width="1"/>
  </g>

  <!-- 小さなアクセント円 -->
  <circle cx="450" cy="180" r="4" fill="#E07898" opacity="0.4"/>
  <circle cx="150" cy="120" r="4" fill="#009944" opacity="0.4"/>
  <circle cx="520" cy="350" r="4" fill="#E07898" opacity="0.4"/>

  <!-- 六角形パターン -->
  <g transform="translate(250, 250)" opacity="0.1">
    <path d="M 30,0 L 15,26 L -15,26 L -30,0 L -15,-26 L 15,-26 Z"
          fill="none" stroke="#009944" stroke-width="1.5"/>
  </g>
</svg>
