<svg width="1440" height="960" viewBox="0 0 1440 960" fill="none" xmlns="http://www.w3.org/2000/svg">
<!-- Right-bottom lines (緑・グレー・ピンクが右下に向かって伸びる) -->
<line class="line-anim line-green-rb" x1="1500" y1="780" x2="620" y2="1020" stroke="#009944" stroke-width="1" stroke-linecap="round"/>
<line class="line-anim line-gray-rb" x1="1540" y1="560" x2="820" y2="1040" stroke="#525252" stroke-width="1" stroke-linecap="round"/>
<line class="line-anim line-pink-rb" x1="1520" y1="320" x2="1100" y2="1080" stroke="#E07898" stroke-width="1" stroke-linecap="round"/>

<!-- Left-top lines (緑・グレー・ピンクが左上に向かって伸びる) -->
<line class="line-anim line-green-lt" x1="-60" y1="180" x2="820" y2="-60" stroke="#009944" stroke-width="1" stroke-linecap="round"/>
<line class="line-anim line-gray-lt" x1="-100" y1="420" x2="620" y2="-80" stroke="#525252" stroke-width="1" stroke-linecap="round"/>
<line class="line-anim line-pink-lt" x1="-80" y1="640" x2="300" y2="-120" stroke="#E07898" stroke-width="1" stroke-linecap="round"/>

<style>
  .line-anim {
    stroke-dasharray: 2000;
    stroke-dashoffset: 2000;
    animation: draw-line 1.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
  }

  /* 時間差で順番に描画 */
  .line-green-rb { animation-delay: 0s; }
  .line-gray-rb { animation-delay: 0.15s; }
  .line-pink-rb { animation-delay: 0.3s; }
  .line-green-lt { animation-delay: 0.45s; }
  .line-gray-lt { animation-delay: 0.6s; }
  .line-pink-lt { animation-delay: 0.75s; }

  @keyframes draw-line {
    to {
      stroke-dashoffset: 0;
    }
  }
</style>
</svg>
