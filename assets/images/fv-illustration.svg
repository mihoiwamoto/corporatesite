<svg viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="fv-grad-1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E07898;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#E07898;stop-opacity:0.05" />
    </linearGradient>
    <linearGradient id="fv-grad-2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#009944;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#009944;stop-opacity:0.05" />
    </linearGradient>
  </defs>

  <!-- Background circles -->
  <circle cx="300" cy="300" r="250" fill="url(#fv-grad-1)" opacity="0.3"/>
  <circle cx="300" cy="300" r="180" fill="url(#fv-grad-2)" opacity="0.3"/>

  <!-- Center: System/Server -->
  <g id="center-system">
    <rect x="250" y="260" width="100" height="80" rx="8" fill="white" stroke="#E07898" stroke-width="3"/>
    <line x1="265" y1="280" x2="335" y2="280" stroke="#E07898" stroke-width="2"/>
    <line x1="265" y1="295" x2="320" y2="295" stroke="#E5E7EB" stroke-width="2"/>
    <line x1="265" y1="310" x2="330" y2="310" stroke="#E5E7EB" stroke-width="2"/>
    <line x1="265" y1="325" x2="310" y2="325" stroke="#E5E7EB" stroke-width="2"/>
  </g>

  <!-- Top: Planning/Requirements (Document) -->
  <g id="top-planning">
    <rect x="260" y="100" width="80" height="100" rx="6" fill="white" stroke="#E07898" stroke-width="2.5" opacity="0.95"/>
    <line x1="275" y1="120" x2="325" y2="120" stroke="#E07898" stroke-width="2.5"/>
    <line x1="275" y1="140" x2="315" y2="140" stroke="#E5E7EB" stroke-width="2"/>
    <line x1="275" y1="155" x2="320" y2="155" stroke="#E5E7EB" stroke-width="2"/>
    <rect x="275" y="170" width="12" height="12" rx="2" fill="white" stroke="#009944" stroke-width="1.5"/>
    <polyline points="278,176 281,179 287,172" fill="none" stroke="#009944" stroke-width="1.5"/>
  </g>

  <!-- Left: Development (Code) -->
  <g id="left-dev">
    <rect x="80" y="250" width="100" height="100" rx="8" fill="white" stroke="#009944" stroke-width="2.5"/>
    <polyline points="100,280 120,300 100,320" fill="none" stroke="#009944" stroke-width="3" stroke-linecap="round"/>
    <polyline points="160,280 140,300 160,320" fill="none" stroke="#009944" stroke-width="3" stroke-linecap="round"/>
    <line x1="130" y1="275" x2="115" y2="325" stroke="#E07898" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Right: Operation (Monitoring) -->
  <g id="right-ops">
    <rect x="420" y="250" width="100" height="100" rx="8" fill="white" stroke="#009944" stroke-width="2.5"/>
    <circle cx="470" cy="285" r="18" fill="none" stroke="#009944" stroke-width="2.5"/>
    <path d="M 470 267 L 470 285 L 482 295" fill="none" stroke="#009944" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="440" y1="320" x2="490" y2="320" stroke="#E07898" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="445" y1="333" x2="485" y2="333" stroke="#E5E7EB" stroke-width="2"/>
  </g>

  <!-- Bottom: Users (People) -->
  <g id="bottom-users">
    <circle cx="280" cy="480" r="20" fill="white" stroke="#E07898" stroke-width="2.5"/>
    <path d="M 280 500 Q 280 492, 288 488 L 298 520 Q 280 528, 262 520 L 272 488 Q 280 492, 280 500 Z" fill="white" stroke="#E07898" stroke-width="2.5"/>

    <circle cx="320" cy="480" r="20" fill="white" stroke="#E07898" stroke-width="2.5"/>
    <path d="M 320 500 Q 320 492, 328 488 L 338 520 Q 320 528, 302 520 L 312 488 Q 320 492, 320 500 Z" fill="white" stroke="#E07898" stroke-width="2.5"/>
  </g>

  <!-- Connection lines -->
  <line x1="300" y1="200" x2="300" y2="260" stroke="#5A6872" stroke-width="2" stroke-dasharray="6,4" opacity="0.4"/>
  <line x1="180" y1="300" x2="250" y2="300" stroke="#5A6872" stroke-width="2" stroke-dasharray="6,4" opacity="0.4"/>
  <line x1="350" y1="300" x2="420" y2="300" stroke="#5A6872" stroke-width="2" stroke-dasharray="6,4" opacity="0.4"/>
  <line x1="290" y1="340" x2="290" y2="460" stroke="#5A6872" stroke-width="2" stroke-dasharray="6,4" opacity="0.4"/>
  <line x1="310" y1="340" x2="310" y2="460" stroke="#5A6872" stroke-width="2" stroke-dasharray="6,4" opacity="0.4"/>

  <!-- Flow arrows -->
  <g id="arrows" opacity="0.6">
    <path d="M 295 255 L 300 245 L 305 255" fill="none" stroke="#E07898" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 245 295 L 235 300 L 245 305" fill="none" stroke="#009944" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 355 305 L 365 300 L 355 295" fill="none" stroke="#009944" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Decorative dots -->
  <circle cx="450" cy="150" r="6" fill="#E07898" opacity="0.3"/>
  <circle cx="150" cy="450" r="8" fill="#009944" opacity="0.3"/>
  <circle cx="500" cy="450" r="5" fill="#E07898" opacity="0.25"/>
  <circle cx="120" cy="180" r="7" fill="#009944" opacity="0.25"/>
</svg>
