<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad-green-3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#009944;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#007A36;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-pink-3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E07898;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C86080;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow-soft-3">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- サーバーラック（3台） -->
  <g>
    <!-- サーバー1 -->
    <rect x="100" y="80" width="70" height="130" rx="10" fill="url(#grad-green-3)" filter="url(#shadow-soft-3)"/>
    <rect x="105" y="85" width="60" height="120" rx="6" fill="#007A36" opacity="0.2"/>
    <circle cx="115" cy="100" r="5" fill="url(#grad-pink-3)" filter="url(#shadow-soft-3)"/>
    <circle cx="135" cy="100" r="5" fill="url(#grad-pink-3)" filter="url(#shadow-soft-3)"/>
    <circle cx="155" cy="100" r="5" fill="url(#grad-pink-3)" filter="url(#shadow-soft-3)"/>
    <rect x="115" y="120" width="40" height="6" rx="3" fill="#fff" opacity="0.8"/>
    <rect x="115" y="135" width="40" height="6" rx="3" fill="#fff" opacity="0.8"/>
    <rect x="115" y="150" width="40" height="6" rx="3" fill="#fff" opacity="0.8"/>

    <!-- サーバー2 -->
    <rect x="180" y="80" width="70" height="130" rx="10" fill="url(#grad-pink-3)" filter="url(#shadow-soft-3)"/>
    <rect x="185" y="85" width="60" height="120" rx="6" fill="#C86080" opacity="0.2"/>
    <circle cx="195" cy="100" r="5" fill="url(#grad-green-3)" filter="url(#shadow-soft-3)"/>
    <circle cx="215" cy="100" r="5" fill="url(#grad-green-3)" filter="url(#shadow-soft-3)"/>
    <circle cx="235" cy="100" r="5" fill="url(#grad-green-3)" filter="url(#shadow-soft-3)"/>
    <rect x="195" y="120" width="40" height="6" rx="3" fill="#fff" opacity="0.8"/>
    <rect x="195" y="135" width="40" height="6" rx="3" fill="#fff" opacity="0.8"/>
    <rect x="195" y="150" width="40" height="6" rx="3" fill="#fff" opacity="0.8"/>

    <!-- サーバー3 -->
    <rect x="260" y="80" width="70" height="130" rx="10" fill="url(#grad-green-3)" filter="url(#shadow-soft-3)"/>
    <rect x="265" y="85" width="60" height="120" rx="6" fill="#007A36" opacity="0.2"/>
    <circle cx="275" cy="100" r="5" fill="url(#grad-pink-3)" filter="url(#shadow-soft-3)"/>
    <circle cx="295" cy="100" r="5" fill="url(#grad-pink-3)" filter="url(#shadow-soft-3)"/>
    <circle cx="315" cy="100" r="5" fill="url(#grad-pink-3)" filter="url(#shadow-soft-3)"/>
    <rect x="275" y="120" width="40" height="6" rx="3" fill="#fff" opacity="0.8"/>
    <rect x="275" y="135" width="40" height="6" rx="3" fill="#fff" opacity="0.8"/>
    <rect x="275" y="150" width="40" height="6" rx="3" fill="#fff" opacity="0.8"/>
  </g>

  <!-- 循環矢印（監視の継続性） -->
  <path d="M 200,240 Q 150,250 120,230" stroke="url(#grad-pink-3)" stroke-width="3" fill="none" opacity="0.8" stroke-linecap="round"/>
  <path d="M 200,240 Q 250,250 280,230" stroke="url(#grad-pink-3)" stroke-width="3" fill="none" opacity="0.8" stroke-linecap="round"/>
  <circle cx="200" cy="240" r="14" fill="#fff" filter="url(#shadow-soft-3)"/>
  <path d="M 196,240 L 200,236 L 204,240 L 200,244 Z" fill="url(#grad-pink-3)"/>

  <!-- ステータスチェックマーク -->
  <path d="M 128,195 L 135,202 L 148,185" stroke="#fff" stroke-width="3" opacity="0.9" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#shadow-soft-3)"/>
  <path d="M 208,195 L 215,202 L 228,185" stroke="#fff" stroke-width="3" opacity="0.9" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#shadow-soft-3)"/>
  <path d="M 288,195 L 295,202 L 308,185" stroke="#fff" stroke-width="3" opacity="0.9" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#shadow-soft-3)"/>
</svg>
