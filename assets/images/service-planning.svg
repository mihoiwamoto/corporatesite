<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-planning" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FBF0F4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg-planning)"/>

  <!-- Documents/Requirements -->
  <!-- Main document -->
  <rect x="180" y="120" width="280" height="360" rx="8" fill="white" stroke="#E07898" stroke-width="2.5" opacity="0.95"/>

  <!-- Document lines (text placeholder) -->
  <line x1="220" y1="160" x2="420" y2="160" stroke="#E07898" stroke-width="3" opacity="0.8"/>
  <line x1="220" y1="190" x2="380" y2="190" stroke="#E5E7EB" stroke-width="2.5"/>
  <line x1="220" y1="215" x2="400" y2="215" stroke="#E5E7EB" stroke-width="2.5"/>
  <line x1="220" y1="240" x2="360" y2="240" stroke="#E5E7EB" stroke-width="2.5"/>

  <!-- Checkboxes -->
  <rect x="220" y="280" width="20" height="20" rx="3" fill="white" stroke="#009944" stroke-width="2"/>
  <polyline points="225,290 230,295 240,282" fill="none" stroke="#009944" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="250" y1="290" x2="400" y2="290" stroke="#E5E7EB" stroke-width="2"/>

  <rect x="220" y="320" width="20" height="20" rx="3" fill="white" stroke="#009944" stroke-width="2"/>
  <polyline points="225,330 230,335 240,322" fill="none" stroke="#009944" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="250" y1="330" x2="380" y2="330" stroke="#E5E7EB" stroke-width="2"/>

  <rect x="220" y="360" width="20" height="20" rx="3" fill="white" stroke="#5A6872" stroke-width="2"/>
  <line x1="250" y1="370" x2="390" y2="370" stroke="#E5E7EB" stroke-width="2"/>

  <!-- Second document (background) -->
  <rect x="200" y="105" width="280" height="360" rx="8" fill="white" stroke="#E07898" stroke-width="2" opacity="0.6"/>

  <!-- Person icon (silhouette) -->
  <circle cx="580" cy="240" r="40" fill="white" stroke="#E07898" stroke-width="3"/>
  <path d="M 580 280 Q 580 270, 590 265 L 610 310 Q 580 320, 550 310 L 570 265 Q 580 270, 580 280 Z" fill="white" stroke="#E07898" stroke-width="3"/>

  <!-- Speech bubble -->
  <ellipse cx="600" cy="180" rx="70" ry="45" fill="white" stroke="#009944" stroke-width="2.5"/>
  <path d="M 560 210 L 555 230 L 570 215 Z" fill="white" stroke="#009944" stroke-width="2.5"/>
  <line x1="570" y1="170" x2="620" y2="170" stroke="#009944" stroke-width="2" stroke-linecap="round"/>
  <line x1="570" y1="185" x2="610" y2="185" stroke="#009944" stroke-width="2" stroke-linecap="round"/>

  <!-- Connecting lines (flow) -->
  <line x1="470" y1="300" x2="530" y2="260" stroke="#5A6872" stroke-width="2" stroke-dasharray="8,6" opacity="0.5"/>

  <!-- Decorative elements -->
  <circle cx="120" cy="150" r="8" fill="#E07898" opacity="0.3"/>
  <circle cx="680" cy="420" r="12" fill="#009944" opacity="0.3"/>
  <circle cx="140" cy="450" r="6" fill="#E07898" opacity="0.25"/>
</svg>
